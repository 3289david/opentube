version: '3.8'
services:
  opentube:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./storage:/app/storage
      - ./opentube.db:/app/opentube.db
    environment:
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - NEXT_PUBLIC_APP_NAME=OpenTube
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/api/trending"]
      interval: 30s
      timeout: 10s
      retries: 3
